<div class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl text-teal-900">Reportes y Estadísticas</h1>
        <p class="text-gray-600">Panel de Administración</p>
      </div>
      <button
        (click)="handleLogout()"
        class="flex items-center gap-2 text-gray-600 hover:text-gray-800"
      >
        <svg lucideLogOut class="w-5 h-5"></svg>
        Cerrar Sesión
      </button>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <div class="flex border-b border-gray-200">
        <button (click)="activeTab.set('clinics')" [class]="getTabClass('clinics')">
          <svg lucideBarChart3 class="w-5 h-5"></svg>
          Turnos por Clínica
        </button>

        <button (click)="activeTab.set('status')" [class]="getTabClass('status')">
          <svg lucidePieChart class="w-5 h-5"></svg>
          Turnos por Estado
        </button>
      </div>

      <div class="p-8">
        @if (activeTab() === 'clinics') {
          <div>
            <h2 class="text-2xl mb-6 text-gray-800">Turnos Atendidos por Clínica</h2>
            <div class="w-full">
              <canvas
                baseChart
                [data]="barChartData()"
                [options]="barChartOptions"
                type="bar"
                style="max-height: 400px"
              ></canvas>
            </div>

            <div class="mt-8 grid grid-cols-2 md:grid-cols-5 gap-4">
              @for (item of ticketsByClinic; track item.clinic) {
                <div key="{item.clinic}" class="bg-teal-50 rounded-xl p-4 text-center">
                  <p class="text-gray-600 text-sm mb-1">{{ item.clinic }}</p>
                  <p class="text-3xl text-teal-600">{{ item.tickets }}</p>
                </div>
              }
            </div>
          </div>
        } @else {
          <app-by-status-chart></app-by-status-chart>
        }
      </div>
    </div>
  </div>
</div>
