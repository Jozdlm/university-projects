<div
  class="min-h-screen bg-linear-to-br from-teal-50 to-blue-50 flex items-center justify-center p-8"
>
  <div class="bg-white rounded-3xl shadow-2xl p-12 max-w-md w-full">
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-teal-600 mb-6">
        <svg lucideLock class="w-10 h-10 text-white"></svg>
      </div>
      <h1 class="text-3xl mb-2 text-teal-900">Iniciar Sesión</h1>
      <p class="text-gray-600">Sistema de Gestión de Turnos</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="handleSubmit()" class="space-y-6">
      <div>
        <label class="block text-gray-700 mb-2" for="email">Correo Electrónico</label>
        <div class="relative">
          <svg
            lucideMail
            class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"
          ></svg>
          <input
            type="email"
            id="email"
            formControlName="email"
            class="w-full pl-12 pr-4 py-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-teal-500 transition-colors"
            placeholder="correo@hospital.com"
            required
          />
        </div>
      </div>

      <div>
        <label class="block text-gray-700 mb-2" for="password">Contraseña</label>
        <div class="relative">
          <svg
            lucideLock
            class="absolute left-4 top-1/2 transform -translate-y-1/2 w-5 h-5 text-gray-400"
          ></svg>
          <input
            type="password"
            id="password"
            formControlName="password"
            class="w-full pl-12 pr-4 py-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-teal-500 transition-colors"
            placeholder="••••••••"
            required
          />
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-teal-600 hover:bg-teal-700 text-white py-4 rounded-xl text-lg transition-colors"
        [disabled]="loginForm.invalid"
      >
        Ingresar
      </button>
    </form>
  </div>
</div>
