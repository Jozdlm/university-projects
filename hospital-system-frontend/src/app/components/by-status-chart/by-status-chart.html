<div>
  <h2 class="text-2xl mb-6 text-gray-800">Distribución de Turnos por Estado</h2>
  <div class="flex flex-col md:flex-row items-center gap-8 w-full">
    <div class="flex-2 w-full">
      <canvas
        baseChart
        [data]="pieChartData()"
        [options]="pieChartOptions"
        type="pie"
        style="max-height: 400px"
      ></canvas>
    </div>
    <div class="flex-1 space-y-4 w-full">
      @for (item of ticketsByStatus(); track item.status) {
        <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded" [style.background-color]="item.color"></div>
            <span class="text-gray-800">{{ item.status | statusLabel | titlecase }}</span>
          </div>
          <span class="text-2xl text-gray-900">{{ item.value }}</span>
        </div>
      }
      <div class="mt-6 pt-6 border-t-2 border-gray-200">
        <div class="flex items-center justify-between">
          <span class="text-gray-800">Total de Turnos</span>
          <span class="text-3xl text-teal-600">
            {{ticketsByStatus().reduce((acc, item) => acc + item.value, 0)}}
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
