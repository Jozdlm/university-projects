<div>
  <h2 class="text-2xl mb-6 text-gray-800">Turnos Atendidos por Clínica</h2>
  <div class="w-full">
    <canvas
      baseChart
      [data]="barChartData()"
      [options]="barChartOptions"
      type="bar"
      style="max-height: 400px"
    ></canvas>
  </div>

  <div class="mt-8 grid grid-cols-2 md:grid-cols-5 gap-4">
    @for (item of ticketsByClinic(); track item.clinic) {
      <div key="{item.clinic}" class="bg-teal-50 rounded-xl p-4 text-center">
        <p class="text-gray-600 text-sm mb-1">{{ item.clinic }}</p>
        <p class="text-3xl text-teal-600">{{ item.tickets }}</p>
      </div>
    }
  </div>
</div>
